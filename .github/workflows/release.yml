name: Release

# Releases are MANUAL: push a vX.Y.Z tag (crates.io + PyPI + GitHub
# Release) or a py-vX.Y.Z tag (PyPI ONLY — Python packaging fixes that
# should not spam crates.io with no-op crate versions). Nothing
# publishes automatically from branch pushes.
on:
  push:
    tags:
      - "v*"
      - "py-v*"

permissions: {}

env:
  CUDARC_CUDA_VERSION: "12060"

jobs:
  ci-check:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --no-run --all-features
      - run: cargo test --doc
      - uses: EmbarkStudios/cargo-deny-action@v2

  publish:
    name: Publish to crates.io
    if: ${{ !startsWith(github.ref_name, 'py-v') }}
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Verify tag matches Cargo.toml
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CARGO_VERSION="v$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes --title "$TAG"

  # PyPI uses trusted publishing (OIDC) — no token secret. One-time
  # setup on pypi.org: Publishing -> add pending publisher for project
  # "sgemm-bi", owner silvermpx, repo sgemm-bi, workflow release.yml,
  # environment "release".
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: ci-check
    environment:
      name: release
      url: https://pypi.org/project/sgemm-bi/
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PY_VERSION="v$(python3 -c 'import tomllib; print(tomllib.load(open("python/pyproject.toml","rb"))["project"]["version"])')"
          TAG_V="${TAG#py-}"
          if [ "$PY_VERSION" != "$TAG_V" ]; then
            echo "Tag $TAG ($TAG_V) does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Build wheel and sdist
        run: |
          pip install "maturin>=1.14,<2"
          cd python && maturin build --release --out dist && maturin sdist --out dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

      # On python-only tags the crates.io job (which owns the GitHub
      # Release on v* tags) is skipped — create the release here instead.
      - name: Create GitHub Release (python-only tag)
        if: ${{ startsWith(github.ref_name, 'py-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes --title "$TAG (PyPI only)"
